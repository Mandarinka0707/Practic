version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: master_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PUBLIC_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongodb:
    image: mongo:6
    container_name: replica_db
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\""]
      interval: 5s
      timeout: 5s
      retries: 20

  etl:
    build:
      context: ./etl
    container_name: etl_worker
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    # Cron will run in foreground; logs go to docker logs
    restart: unless-stopped

volumes:
  pg_data:
  mongo_data:

